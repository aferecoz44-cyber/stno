<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirect</title>
</head>
<body>
<script>
(function () {
  'use strict';

    // --- Конфигурация ---
  var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwE_6nkJC0qLgGs02NYEazRSFqql8hF3NkbruL9qJyk0j3uS9G4u9J4WICuRFCM9eCoHA/exec';

    // --- 1. Получаем параметры Q и mle из GET ---
  var params = new URLSearchParams(window.location.search);
  var Q = params.get('Q');
  var mle = params.get('mle');

    // --- 2. Инжектим стили и разметку прелоадера ---
  var style = document.createElement('style');
  style.textContent = [
    'html, body {',
    '  margin: 0; padding: 0; height: 100%;',
    '  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;',
    '  background: #0f1115; color: #e6e6e6;',
    '  overflow: hidden;',
    '}',
    '#preloader {',
    '  position: fixed; inset: 0;',
    '  display: flex; flex-direction: column;',
    '  align-items: center; justify-content: center;',
    '  gap: 24px;',
    '  transition: opacity .3s ease;',
    '}',
    '#preloader.hidden { opacity: 0; pointer-events: none; }',
    '.spinner {',
    '  width: 48px; height: 48px;',
    '  border: 3px solid rgba(255,255,255,0.12);',
    '  border-top-color: #6ea8ff;',
    '  border-radius: 50%;',
    '  animation: spin 0.9s linear infinite;',
    '}',
    '@keyframes spin { to { transform: rotate(360deg); } }',
    '.message { font-size: 15px; letter-spacing: .2px; opacity: .85; }',
    '.error {',
    '  max-width: 420px; text-align: center; padding: 0 24px;',
    '  color: #ff8b8b; font-size: 14px; line-height: 1.5;',
    '}'
  ].join('\n');
  document.head.appendChild(style);

    var preloader = document.createElement('div');
  preloader.id = 'preloader';
  preloader.innerHTML =
    '<div class="spinner"></div>' +
    '<div class="message">Подождите, выполняется переход…</div>';
  document.body.appendChild(preloader);

    // --- 3. Утилиты ---
  function showError(text) {
    preloader.innerHTML = '<div class="error">' + text + '</div>';
  }

  function redirectTo(url) {
    // Плавное скрытие прелоадера перед редиректом
    preloader.classList.add('hidden');
    // window.location.replace — не засоряет историю, Back-кнопка не вернёт сюда же
    setTimeout(function () {
      window.location.replace(url);
    }, 150);
  }

  // --- 4. Валидация входа ---
  if (!Q || !mle) {
    showError('Отсутствуют обязательные параметры запроса.');
    return;
  }

    // --- 5. Запрос к Apps Script ---
  // Используем text/plain, чтобы не триггерить CORS preflight (OPTIONS),
  // который Apps Script не обрабатывает. Сервер всё равно парсит JSON
  // из e.postData.contents.
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: "no-cors",
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ Q: Q, mle: mle }),
    redirect: 'follow'
  })
    .then(function (response) {
      if (!response.ok) {
        throw new Error('HTTP ' + response.status);
      }
      return response.json();
    })
    .then(function (data) {
      if (data && data.action === 'OK' && data.url) {
        redirectTo(data.url);
      } else {
        var msg = (data && data.error) ? data.error : 'Не удалось получить ссылку для перехода.';
        showError(msg);
      }
    })
    .catch(function (err) {
      showError('Ошибка соединения: ' + err.message);
    });
})();
</script>
</body>
</html>
